{% extends 'base.html' %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h1 class="card-title text-center">Contact Us</h1>
    </div>
    <div class="row">
        <div class="col-md-6">
            <h3 style="color: var(--primary-color); margin-bottom: 20px;">Get in Touch</h3>
            <p>Have questions or need support? We're here to help!</p>
            
            <div style="margin-top: 30px;">
                <h4>📧 Email</h4>
                <p>support@ocems.edu</p>
                
                <h4 style="margin-top: 20px;">📞 Phone</h4>
                <p>+1 (555) 123-4567</p>
                
                <h4 style="margin-top: 20px;">📍 Address</h4>
                <p>123 Education Avenue<br>Academic City, AC 12345</p>
            </div>
        </div>
        
        <div class="col-md-6">
            <h3 style="color: var(--primary-color); margin-bottom: 20px;">Send us a Message</h3>
            <form>
                <div class="form-group">
                    <label class="form-label">Your Name</label>
                    <input type="text" class="form-control" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Subject</label>
                    <input type="text" class="form-control" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Message</label>
                    <textarea class="form-control" rows="5" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Send Message</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
