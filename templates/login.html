{% extends 'base.html' %}

{% block content %}
<div class="container" style="max-width: 460px;">

    <div class="card fade-in">

        <div class="card-header">
            <h2 class="card-title">Welcome Back!</h2>
        </div>
        <p class="text-center mb-2" style="color: rgb(var(--muted));">Login to your account</p>

        <!-- Tabs -->
        <ul class="nav-tabs mb-3" id="loginTabs">
            <li><button class="nav-tab active" onclick="switchTab('admin')">Admin</button></li>
            <li><button class="nav-tab" onclick="switchTab('student')">Student</button></li>
            <li><button class="nav-tab" onclick="switchTab('instructor')">Instructor</button></li>
        </ul>

        <!-- Admin Login -->
        <div id="adminLogin" class="tab-content">
            <form method="post" action="{% url 'adminlogincheck' %}">
                {% csrf_token %}
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="input" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="input" required>
                </div>

                <button class="btn btn-primary d-block" style="width: 100%;">Login as Admin</button>
            </form>
        </div>

        <!-- Student Login -->
        <div id="studentLogin" class="tab-content" style="display: none;">
            <form method="post" action="{% url 'studentlogincheck' %}">
                {% csrf_token %}
                <div class="form-group">
                    <label class="form-label">Student ID</label>
                    <input type="text" name="studentid" class="input" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="input" required>
                </div>

                <button class="btn btn-primary d-block" style="width: 100%;">Login as Student</button>
            </form>
        </div>

        <!-- Instructor Login -->
        <div id="instructorLogin" class="tab-content" style="display: none;">
            <form method="post" action="{% url 'instructorlogincheck' %}">
                {% csrf_token %}
                <div class="form-group">
                    <label class="form-label">Instructor ID</label>
                    <input type="text" name="instructorid" class="input" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="input" required>
                </div>

                <button class="btn btn-primary d-block" style="width: 100%;">Login as Instructor</button>
            </form>
        </div>

        <div class="text-center mt-2">
            <a href="{% url 'home' %}" class="btn-ghost">← Back to Home</a>
        </div>

    </div>
</div>

<script>
function switchTab(tab) {
    document.getElementById('adminLogin').style.display = 'none';
    document.getElementById('studentLogin').style.display = 'none';
    document.getElementById('instructorLogin').style.display = 'none';

    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));

    if (tab === 'admin') {
        document.getElementById('adminLogin').style.display = 'block';
        document.querySelectorAll('.nav-tab')[0].classList.add('active');
    } else if (tab === 'student') {
        document.getElementById('studentLogin').style.display = 'block';
        document.querySelectorAll('.nav-tab')[1].classList.add('active');
    } else {
        document.getElementById('instructorLogin').style.display = 'block';
        document.querySelectorAll('.nav-tab')[2].classList.add('active');
    }
}
</script>
{% endblock %}
