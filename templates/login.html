{% extends 'base.html' %}

{% block content %}

<div class="container" style="max-width: 460px; margin-top: 60px;">
    <div class="card fade-in">

        <!-- Header -->
        <div class="card-header">
            <h2 class="card-title" style="margin-bottom: 4px;">Welcome Back!</h2>
        </div>
        <p class="text-center mb-3" style="color: rgb(var(--muted));">
            Login to your account
        </p>

        <!-- Tabs -->
        <ul class="nav-tabs mb-3" id="loginTabs">
            <li><button class="nav-tab active" onclick="switchTab('admin')">Admin</button></li>
            <li><button class="nav-tab" onclick="switchTab('student')">Student</button></li>
            <li><button class="nav-tab" onclick="switchTab('instructor')">Instructor</button></li>
        </ul>

        <!-- Admin Login -->
        <div id="adminLogin" class="tab-content">
            <form method="post" action="{% url 'adminlogincheck' %}">
                {% csrf_token %}
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="input" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="input" required>
                </div>

                <button class="btn btn-primary d-block" style="width: 100%;">
                    Login as Admin
                </button>
            </form>
        </div>

        <!-- Student Login -->
        <div id="studentLogin" class="tab-content" style="display: none;">
            <form method="post" action="{% url 'studentlogincheck' %}">
                {% csrf_token %}
                <div class="form-group">
                    <label class="form-label">Student ID</label>
                    <input type="text" name="studentid" class="input" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="input" required>
                </div>

                <button class="btn btn-primary d-block" style="width: 100%;">
                    Login as Student
                </button>
            </form>
        </div>

        <!-- Instructor Login -->
        <div id="instructorLogin" class="tab-content" style="display: none;">
            <form method="post" action="{% url 'instructorlogincheck' %}">
                {% csrf_token %}
                <div class="form-group">
                    <label class="form-label">Instructor ID</label>
                    <input type="text" name="instructorid" class="input" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="input" required>
                </div>

                <button class="btn btn-primary d-block" style="width: 100%;">
                    Login as Instructor
                </button>
            </form>
        </div>

        <!-- Back -->
        <div class="text-center mt-3">
            <a href="{% url 'home' %}" class="btn btn-ghost">
                ← Back to Home
            </a>
        </div>
    </div>
</div>

<script>
function switchTab(tab) {
    const sections = {
        admin: document.getElementById('adminLogin'),
        student: document.getElementById('studentLogin'),
        instructor: document.getElementById('instructorLogin')
    };

    // Hide all
    for (const s in sections) sections[s].style.display = 'none';

    // Remove active from all tabs
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));

    // Show selected
    sections[tab].style.display = 'block';

    // Activate tab button
    const index = { admin: 0, student: 1, instructor: 2 };
    document.querySelectorAll('.nav-tab')[index[tab]].classList.add('active');
}
</script>

{% endblock %}
