{% extends 'base.html' %}
{% block content %}

<div class="card">
    <div class="card-header">
        <h2 class="card-title">Create New Course</h2>
        <p style="margin: 0; color: rgb(var(--muted));">
            Instructor: {{ instructor.fullname }} (ID: {{ instructor.instructorid }})
        </p>
    </div>

    <form method="post">
        {% csrf_token %}

        <div class="row">

            <div class="col-md-6">
                <div class="form-group">
                    <label class="form-label">Department *</label>
                    <input type="text" name="department" class="input" required>
                </div>
            </div>

            <div class="col-md-6">
                <div class="form-group">
                    <label class="form-label">Academic Year *</label>
                    <input type="text" name="academicyear" class="input" placeholder="2024-2025" required>
                </div>
            </div>

            <div class="col-md-6">
                <div class="form-group">
                    <label class="form-label">Semester *</label>
                    <input type="text" name="semester" class="input" placeholder="Fall / Spring" required>
                </div>
            </div>

            <div class="col-md-6">
                <div class="form-group">
                    <label class="form-label">Year *</label>
                    <input type="number" name="year" class="input" required>
                </div>
            </div>

            <div class="col-md-6">
                <div class="form-group">
                    <label class="form-label">Course Code *</label>
                    <input type="text" name="coursecode" class="input" required>
                </div>
            </div>

            <div class="col-md-6">
                <div class="form-group">
                    <label class="form-label">Course Title *</label>
                    <input type="text" name="coursetitle" class="input" required>
                </div>
            </div>

            <div class="col-md-6">
                <div class="form-group">
                    <label class="form-label">Credits</label>
                    <input type="number" name="credits" class="input" value="3">
                </div>
            </div>

        </div>

        <div class="flex" style="gap: 12px; margin-top: 20px;">
            <button type="submit" class="btn btn-primary">Create Course</button>
            <a href="{% url 'instructorcourses' %}" class="btn btn-ghost">Cancel</a>
        </div>

    </form>
</div>

{% endblock %}
