{% extends 'base.html' %}
{% block content %}

<div class="card">
    <div class="card-header">
        <h2 class="card-title">Add New Course</h2>
    </div>

    <form method="post">
        {% csrf_token %}

        <div class="row">

            <div class="col-md-6">
                <div class="form-group">
                    <label class="form-label">Department *</label>
                    <input type="text" name="department" class="input" required>
                </div>
            </div>

            <div class="col-md-6">
                <div class="form-group">
                    <label class="form-label">Academic Year *</label>
                    <input type="text" name="academicyear" class="input" placeholder="2024-2025" required>
                </div>
            </div>

            <div class="col-md-6">
                <div class="form-group">
                    <label class="form-label">Semester *</label>
                    <input type="text" name="semester" class="input" placeholder="Fall / Spring" required>
                </div>
            </div>

            <div class="col-md-6">
                <div class="form-group">
                    <label class="form-label">Year *</label>
                    <input type="number" name="year" class="input" required>
                </div>
            </div>

            <div class="col-md-6">
                <div class="form-group">
                    <label class="form-label">Course Code *</label>
                    <input type="text" name="coursecode" class="input" required>
                </div>
            </div>

            <div class="col-md-6">
                <div class="form-group">
                    <label class="form-label">Course Title *</label>
                    <input type="text" name="coursetitle" class="input" required>
                </div>
            </div>

            <div class="col-md-6">
                <div class="form-group">
                    <label class="form-label">Credits</label>
                    <input type="number" name="credits" class="input" value="3">
                </div>
            </div>

            <div class="col-md-6">
                <div class="form-group">
                    <label class="form-label">Instructor</label>
                    <select name="instructor_id" class="input">
                        <option value="">Select Instructor</option>
                        {% for instructor in instructors %}
                            <option value="{{ instructor.id }}">{{ instructor.fullname }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

        </div>

        <div class="flex" style="gap: 12px; margin-top: 20px;">
            <button type="submit" class="btn btn-primary">Add Course</button>
            <a href="{% url 'allcourses' %}" class="btn btn-ghost">Cancel</a>
        </div>

    </form>
</div>

{% endblock %}
